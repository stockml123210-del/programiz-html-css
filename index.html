<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diego Tai😹</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ffd6ec,#ffe9f6,#fff7fb);
}

/* Halaman */
.page{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:0.8s;
}

#home{
    z-index:2;
}

#main{
    opacity:0;
    pointer-events:none;
}

/* Tombol masuk */
#enter{
    font-size:28px;
    font-weight:bold;
    color:#ff4f9a;
    background:white;
    padding:18px 30px;
    border-radius:50px;
    box-shadow:0 0 20px rgba(255,105,180,.4);
    cursor:pointer;
    animation:pulse 1.5s infinite;
    user-select:none;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

/* Teks utama */
#text{
    font-size:28px;
    font-weight:bold;
    color:#ff2d7a;
    text-shadow:0 0 15px pink;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* Emoji mengambang */
.item{
    position:absolute;
    font-size:28px;
    animation:fall linear infinite;
    user-select:none;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div id="home" class="page">
    <div id="enter">💖 Tekan Aku Untuk Masuk 💖</div>
</div>

<div id="main" class="page">
    <div id="text">Diego Tai😹</div>
</div>

<script>
const emojis=["💖","💕","💗","💝","🐻","🧸","🤍","🌸"];

function createEmoji(){
    const e=document.createElement("div");
    e.className="item";
    e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(4+Math.random()*4)+"s";
    e.style.fontSize=(20+Math.random()*25)+"px";
    document.body.appendChild(e);

    setTimeout(()=>{
        e.remove();
    },8000);
}

setInterval(createEmoji,300);

document.getElementById("enter").onclick=()=>{
    document.getElementById("home").style.opacity="0";
    document.getElementById("home").style.pointerEvents="none";

    document.getElementById("main").style.opacity="1";
    document.getElementById("main").style.pointerEvents="auto";
};
</script>

</body>
</html>
